<main class="min-h-screen bg-slate-100 px-4 py-8 text-slate-900 sm:px-8">
  <div class="mx-auto max-w-5xl">
    <h1 class="mb-6 text-4xl font-semibold tracking-tight text-sky-700 sm:text-5xl">
      {{ title }}
    </h1>

    <nav class="mb-6 flex gap-3" aria-label="Primary">
      <a
        class="rounded-md px-4 py-2 text-sm font-medium"
        routerLink="/heroes"
        routerLinkActive="bg-sky-600 text-white"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Heroes
      </a>
      <a
        class="rounded-md px-4 py-2 text-sm font-medium"
        routerLink="/about"
        routerLinkActive="bg-sky-600 text-white"
      >
        About
      </a>
    </nav>

    <router-outlet />
  </div>
</main>
